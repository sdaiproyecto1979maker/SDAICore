name: Notify on New Issue

on:
  issues:
    types: [opened]

jobs:
  send_email:
    runs-on: ubuntu-latest

    steps:
    - name: Send Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: 'Nueva incidencia creada: ${{ github.event.issue.title }}'
        body: 'Se ha creado una nueva inicidencia para el proyecto SDAICore. \n\n Titulo: ${{ github.event.issue.title }}\n\n Descripción: ${{ github.event.issue.body }}\n\nURL: ${{ github.event.issue.html_url }}'
        to: 'sdaiproyecto.1979.maker@gmail.com'
        from: 'sdaiproyecto.1979.maker@gmail.com'
