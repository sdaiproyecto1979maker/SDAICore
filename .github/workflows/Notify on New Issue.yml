name: Notify on New Issue

on:
  issues:
    types: [opened]

jobs:
  send_email:
    runs-on: ubuntu-latest

    steps:
    - name: Send Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: 'New Issue Created: ${{ github.event.issue.title }}'
        body: 'A new issue has been created in your repository. \n\nIssue title: ${{ github.event.issue.title }}\n\nIssue body: ${{ github.event.issue.body }}\n\nURL: ${{ github.event.issue.html_url }}'
        to: 'sdaiproyecto.1979.maker@gmail.com'
        from: 'sdaiproyecto.1979.maker@gmail.com'
